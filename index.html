<script>
// ---- PWA manifest를 런타임에 Blob URL로 생성 (안드로이드 "앱 설치"·iOS 홈화면 추가 정식 활성화) ----
(function () {
  try {
    var iconHref = document.getElementById("appIcon").href;
    var icon512Href = document.getElementById("appIcon512").href;
    var manifest = {
      name: "Travel Planner",
      short_name: "TravelPlanner",
      start_url: ".",
      scope: ".",
      display: "standalone",
      background_color: "#F4ECDD",
      theme_color: "#16323A",
      orientation: "portrait",
      icons: [
        { src: iconHref, sizes: "192x192", type: "image/png", purpose: "any maskable" },
        { src: icon512Href, sizes: "512x512", type: "image/png", purpose: "any maskable" },
      ],
    };
    var blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    var link = document.createElement("link");
    link.rel = "manifest";
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch (e) {}
})();
</script>
<style>
  :root {

  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; background: var(--sand); color: var(--navy); }

"- " + daysLabel + ", " + peopleNum + "인 가족, 총경비 " + Math.round(maxWon/10000) + "만원 이하(목표 " + Math.round(goalWon/10000) + "만원, 항공권 포함)\n" +

"위 개수 조건을 절대 줄이지 말고, 모자라면 같은 지역의 다른 실제 상호를 더 찾아서 반드시 개수를 채워.\n\n" +
'반드시 아래 JSON 형식만 출력해(설명, 코드블럭, 다른 텍스트 금지):\n' +

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

async function generateTripDirectly(destination, apiKey, opt) {
  var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + encodeURIComponent(apiKey);
  var systemPrompt = buildSystemPrompt(opt);
  var res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      contents: [{ role: "user", parts: [{ text: systemPrompt + "\n\n여행지: " + destination }] }],
      tools: [{ googleSearch: {} }],
      generationConfig: { maxOutputTokens: 30000 },
    }),
  });
  if (!res.ok) {
    var errText = await res.text();
    throw new Error("API 오류 (" + res.status + ") — 키를 확인해 주세요. " + errText.slice(0, 150));
  }
  var data = await res.json();
  var parts = (data.candidates && data.candidates[0] && data.candidates[0].content.parts) || [];
  var text = parts.map(function (p) { return p.text || ""; }).join("\n");
  var clean = text.replace(/```json|```/g, "").trim();
  var s = clean.indexOf("{"), e = clean.lastIndexOf("}");
  if (s === -1 || e === -1) throw new Error("응답에서 JSON을 찾지 못했습니다.");
  var jsonStr = clean.slice(s, e + 1);
  // Gemini가 문자열 값 안에 실제 줄바꿈/탭 같은 제어문자를 그대로 넣는 경우가 있어 JSON.parse가 깨짐 → 제거 후 재시도
  try {
    return JSON.parse(jsonStr);
  } catch (err) {
    var sanitized = jsonStr.replace(/[\u0000-\u001F]+/g, " ");
    try {
      return JSON.parse(sanitized);
    } catch (err2) {
      throw new Error("응답 JSON 파싱에 실패했습니다 (" + err2.message + "). 다시 시도해 주세요.");
    }
  }
}

async function kvCreateBucket() {
  var res = await fetch("https://kvdb.io/", { method: "POST" });
  if (!res.ok) throw new Error("공유 코드 생성 실패");
  return (await res.text()).trim();
}
async function kvSet(bucket, key, valueObj) {
  await fetch("https://kvdb.io/" + bucket + "/" + encodeURIComponent(key), { method: "POST", body: JSON.stringify(valueObj) });
}
async function kvGet(bucket, key) {
  var res = await fetch("https://kvdb.io/" + bucket + "/" + encodeURIComponent(key));
  if (!res.ok) return null;
  var text = await res.text();
  try { return JSON.parse(text); } catch (e) { return null; }
}

function calcBudgetBreakdown(goalWon) {
  var m = Math.round(goalWon / 10000);
  return [
    { label: "항공권", pct: 28, amount: Math.round(m * 0.28), color: "#E8642C" },
    { label: "숙소", pct: 32, amount: Math.round(m * 0.32), color: "#3C8C7C" },
    { label: "렌트카", pct: 10, amount: Math.round(m * 0.10), color: "#8FA3A6" },
    { label: "식비·카페", pct: 22, amount: Math.round(m * 0.22), color: "#C1632E" },
    { label: "쇼핑·기타", pct: 8, amount: Math.round(m * 0.08), color: "#16323A" },
  ];
}

function loadPptxLibIfNeeded() {
  return new Promise(function (resolve, reject) {
    if (typeof PptxGenJS !== "undefined") return resolve();
    var script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js";
    script.onload = function () { resolve(); };
    script.onerror = function () { reject(new Error("PPT 라이브러리 로드 실패 (네트워크/CDN 차단 가능성)")); };
    document.head.appendChild(script);
  });
}

  var pptx = new PptxGenJS();

    { x: 0.9, y: 4.1, w: 11, h: 0.5, fontSize: 13, color: CORAL, fontFace: "Arial" });
  addFooter(cover, "01");

  // 2) 예산 분배 (도넛/막대 대신 컬러 바)
  var b = pptx.addSlide();
  b.background = { color: SAND };
  b.addText("예산 분배 계획", { x: 0.6, y: 0.4, w: 10, h: 0.6, fontSize: 26, bold: true, color: NAVY, fontFace: "Georgia" });

    barX += w;
  });
  var legendY = 2.5;
  breakdown.forEach(function (item, i) {
    var col = i % 3, rowY = legendY + Math.floor(i / 3) * 1.0;
    var x = 0.6 + col * 4.0;
    b.addShape("ellipse", { x: x, y: rowY + 0.05, w: 0.18, h: 0.18, fill: { color: item.color.replace("#", "") } });
    b.addText(item.label, { x: x + 0.3, y: rowY - 0.08, w: 3, h: 0.3, fontSize: 12, color: MUTED, fontFace: "Arial" });
    b.addText(item.amount.toLocaleString() + "만원", { x: x + 0.3, y: rowY + 0.2, w: 3, h: 0.35, fontSize: 16, bold: true, color: NAVY, fontFace: "Arial" });
  });
  addFooter(b, "02");

  function addListSlide(title, rows, pageLabel) {
    var s = pptx.addSlide();

      s.addText(r.note || "", { x: 0.6, y: y + 0.33, w: 12, h: 0.32, fontSize: 11, color: MUTED, fontFace: "Arial" });
      y += 0.78;
    });
    addFooter(s, pageLabel);
    return s;
  }

  addListSlide("항공권 추천", t.flights.map(function (f) { return { title: f.name, right: f.price, note: f.note }; }), "03");

  addListSlide("관광지 & 휴양지", t.spots.map(function (s) { return { title: "[" + s.type + "] " + s.name, right: s.dist, note: s.note }; }), "05");
  addListSlide("식사", t.food.map(function (f) { return { title: "[" + f.meal + "] " + f.name, note: f.note }; }), "06");
  addListSlide("카페", t.cafes.map(function (c) { return { title: "[" + c.meal + "] " + c.name, note: c.note }; }), "07");
  addListSlide("쇼핑 / 기념품", t.shops.map(function (s) { return { title: s.name, note: s.note }; }), "08");

  // 일정표 (Day별)
  t.itinerary.forEach(function (d, di) {
    var s = pptx.addSlide();
    s.background = { color: SAND };
    s.addText(d.day, { x: 0.6, y: 0.4, w: 6, h: 0.5, fontSize: 24, bold: true, color: NAVY, fontFace: "Georgia" });
    s.addText(d.sub, { x: 0.6, y: 0.95, w: 11, h: 0.35, fontSize: 12, color: MUTED, fontFace: "Arial" });
    s.addShape("line", { x: 0.6, y: 1.35, w: 12.1, h: 0, line: { color: CORAL, width: 2 } });
    var y = 1.6;
    d.stops.forEach(function (st) {
      s.addShape("ellipse", { x: 0.6, y: y + 0.06, w: 0.14, h: 0.14, fill: { color: CORAL.replace("#", "") } });
      s.addText(st.time, { x: 0.95, y: y, w: 0.9, h: 0.32, fontSize: 12, bold: true, color: TEAL, fontFace: "Arial" });
      s.addText(st.label, { x: 1.9, y: y, w: 9.0, h: 0.32, fontSize: 13, color: NAVY, fontFace: "Arial" });
      if (st.dist) s.addText(st.dist, { x: 11.0, y: y, w: 1.7, h: 0.32, fontSize: 10, color: MUTED, align: "right", fontFace: "Arial" });
      y += 0.55;
    });
    addFooter(s, String(9 + di).padStart(2, "0"));
  });

  pptx.writeFile({ fileName: t.meta.destination.replace(/[\\/:*?"<>|]/g, "") + "_가족여행계획.pptx" });
}

async function fetchSouvenirImage(query) {
  try {
    var url = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages&piprop=thumbnail&pithumbsize=320&generator=search&gsrsearch=" + encodeURIComponent(query) + "&gsrlimit=1";
    var res = await fetch(url);
    if (!res.ok) return null;
    var data = await res.json();
    var pages = data.query && data.query.pages;
    if (!pages) return null;
    var first = Object.values(pages)[0];
    return (first && first.thumbnail && first.thumbnail.source) || null;
  } catch (e) {
    return null;
  }
}

function renderDateSelects(prefix, isoValue) {
  var now = new Date();
  var y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();
  if (isoValue) {
    var parts = isoValue.split("-");
    if (parts.length === 3) { y = parseInt(parts[0], 10); m = parseInt(parts[1], 10); d = parseInt(parts[2], 10); }
  }
  var years = [];
  for (var yy = now.getFullYear(); yy <= now.getFullYear() + 2; yy++) years.push(yy);
  var daysInMonth = new Date(y, m, 0).getDate();
  var yearOpts = years.map(function (yv) { return '<option value="' + yv + '"' + (yv === y ? " selected" : "") + '>' + yv + '년</option>'; }).join("");
  var monthOpts = "";
  for (var mm = 1; mm <= 12; mm++) monthOpts += '<option value="' + mm + '"' + (mm === m ? " selected" : "") + '>' + mm + '월</option>';
  var dayOpts = "";
  for (var dd = 1; dd <= daysInMonth; dd++) dayOpts += '<option value="' + dd + '"' + (dd === d ? " selected" : "") + '>' + dd + '일</option>';
  return '<select class="opt-input date-sel" data-which="' + prefix + '" data-part="y">' + yearOpts + '</select>' +
    '<select class="opt-input date-sel" data-which="' + prefix + '" data-part="m">' + monthOpts + '</select>' +
    '<select class="opt-input date-sel" data-which="' + prefix + '" data-part="d">' + dayOpts + '</select>';
}

function calcDaysLabel(startStr, endStr) {
  if (!startStr || !endStr) return "3박4일";
  var s = new Date(startStr), e = new Date(endStr);
  var nights = Math.round((e - s) / (1000 * 60 * 60 * 24));
  if (nights <= 0) return "3박4일";
  return nights + "박" + (nights + 1) + "일";
}

function loadInitial() {
  try {
    var listRaw = localStorage.getItem("trip_list");
    var parsed = listRaw ? JSON.parse(listRaw) : null;
    if (!parsed || !parsed.length) {
      state.savedTrips = [{ destination: "삿포로 (홋카이도)", country: "일본" }];
    } else if (typeof parsed[0] === "string") {
      // 이전 버전(문자열 배열) 마이그레이션: 각 트립의 country를 저장된 데이터에서 찾아옴
      state.savedTrips = parsed.map(function (d) {
        var raw = localStorage.getItem("trip:" + d);
        var country = "기타";
        try { country = raw ? (JSON.parse(raw).meta.country || "기타") : "기타"; } catch (e) {}
        return { destination: d, country: country };
      });
    } else {
      state.savedTrips = parsed;
    }
  } catch (e) {
    state.savedTrips = [{ destination: "삿포로 (홋카이도)", country: "일본" }];
  }
  state.savedTrips.forEach(function (t) { state.openFolders[t.country] = true; });
  // 기본(삿포로) 데이터는 항상 최신 버전으로 덮어써서, 이전에 저장된 캐시 데이터가 남아있지 않게 한다.
  localStorage.setItem("trip:삿포로 (홋카이도)", JSON.stringify(DEFAULT_TRIP));
  var cur = localStorage.getItem("trip:삿포로 (홋카이도)");
  state.trip = cur ? JSON.parse(cur) : DEFAULT_TRIP;
}

function persistTrip(destination, data) {
  localStorage.setItem("trip:" + destination, JSON.stringify(data));
  var country = (data.meta && data.meta.country) || "기타";
  var next = [{ destination: destination, country: country }].concat(
    state.savedTrips.filter(function (t) { return t.destination !== destination; })
  );
  state.savedTrips = next;
  state.openFolders[country] = true;
  localStorage.setItem("trip_list", JSON.stringify(next));
}

function deleteTrip(destination) {
  localStorage.removeItem("trip:" + destination);
  state.savedTrips = state.savedTrips.filter(function (t) { return t.destination !== destination; });
  localStorage.setItem("trip_list", JSON.stringify(state.savedTrips));
  if (state.trip && state.trip.meta.destination === destination) {
    var fallback = state.savedTrips[0];
    if (fallback) {
      var raw = localStorage.getItem("trip:" + fallback.destination);
      state.trip = raw ? JSON.parse(raw) : DEFAULT_TRIP;
    } else {
      state.trip = DEFAULT_TRIP;
    }
  }
  render();
}

function groupTripsByCountry() {
  var groups = {};
  state.savedTrips.forEach(function (t) {
    var c = t.country || "기타";
    if (!groups[c]) groups[c] = [];
    groups[c].push(t);
  });
  return groups;
}

function loadTrip(destination) {
  var raw = localStorage.getItem("trip:" + destination);
  if (raw) { state.trip = JSON.parse(raw); state.activeTab = "flight"; render(); }
}

var pollId = null;
function startPolling() {
  if (pollId) clearInterval(pollId);
  fetchShared();
  pollId = setInterval(fetchShared, 5000);
}
async function fetchShared() {
  var code = state.familyCode.trim();
  if (!code) return;
  var list = await kvGet(code, "list");
  if (list) { state.sharedList = list; render(); }
}

async function handleGenerate() {
  var destination = state.destInput.trim();
  if (!destination) return;
  if (!state.apiKey) { state.showKeyBox = true; state.error = "먼저 Gemini API 키를 입력해 주세요 (aistudio.google.com/apikey에서 무료 발급)."; render(); return; }
  state.genLoading = true; state.error = ""; render();
  var lastErr = null;
  for (var attempt = 1; attempt <= 3; attempt++) {
    try {
      state.error = attempt > 1 ? ("재시도 중... (" + attempt + "/3)") : "";
      if (attempt > 1) render();
      var data = await generateTripDirectly(destination, state.apiKey, state.opt);
      state.trip = data;
      persistTrip(destination, data);
      state.activeTab = "flight";
      state.destInput = "";
      state.error = "";
      lastErr = null;
      break;
    } catch (e) {
      lastErr = e;
    }
  }
  if (lastErr) state.error = "자동 생성에 실패했어요(3회 시도): " + lastErr.message;
  state.genLoading = false; render();
}

async function handleCreateFamilyCode() {
  state.shareStatus = "코드 생성 중..."; render();
  try {
    var code = await kvCreateBucket();
    state.familyCode = code;
    localStorage.setItem("family_code", code);
    state.syncOn = true;
    state.shareStatus = '새 가족 코드: "' + code + '" — 이 코드를 가족에게 보내주세요.';
    startPolling();
  } catch (e) {
    state.shareStatus = "코드 생성 실패: " + e.message;
  }
  render();
}

function handleConnectFamilyCode() {
  var code = state.familyCode.trim();
  if (!code) { state.shareStatus = "가족에게 받은 코드를 입력해 주세요."; render(); return; }
  localStorage.setItem("family_code", code);
  state.syncOn = true;
  state.shareStatus = '"' + code + '" 코드로 연결했어요. 5초마다 자동 동기화돼요.';
  startPolling();
  render();
}

async function handleShareUpload() {
  var code = state.familyCode.trim();
  if (!code) { state.shareStatus = "먼저 코드를 만들거나 입력해 주세요."; render(); return; }
  state.shareStatus = "공유 중..."; render();
  try {
    var list = (await kvGet(code, "list")) || [];
    var dest = state.trip.meta.destination;
    var next = [dest].concat(list.filter(function (d) { return d !== dest; }));
    await kvSet(code, "list", next);
    await kvSet(code, "trip:" + dest, state.trip);
    state.shareStatus = '"' + dest + '" 일정을 공유했어요.';
  } catch (e) {
    state.shareStatus = "공유 실패: " + e.message;
  }
  render();
}

async function loadSharedTrip(destination) {
  var code = state.familyCode.trim();
  var data = await kvGet(code, "trip:" + destination);
  if (data) { state.trip = data; persistTrip(destination, data); state.activeTab = "flight"; }
  else { state.error = "공유된 일정을 불러오지 못했어요."; }
  render();
}

function attachEvents() {
  function readDateSelects(which) {
    var y = document.querySelector('.date-sel[data-which="' + which + '"][data-part="y"]');
    var m = document.querySelector('.date-sel[data-which="' + which + '"][data-part="m"]');
    var d = document.querySelector('.date-sel[data-which="' + which + '"][data-part="d"]');
    if (!y || !m || !d) return "";
    var mm = ("0" + m.value).slice(-2), dd = ("0" + d.value).slice(-2);
    return y.value + "-" + mm + "-" + dd;
  }
  document.querySelectorAll(".date-sel").forEach(function (sel) {
    sel.addEventListener("change", function () {
      var which = sel.getAttribute("data-which");
      var iso = readDateSelects(which);
      if (which === "Start") state.opt.startDate = iso;
      else state.opt.endDate = iso;
      render();
    });
  });
  var optPeople = document.getElementById("optPeople");
  if (optPeople) optPeople.addEventListener("change", function (e) {
    state.opt.people = parseInt(e.target.value, 10) || 4;
    if (state.trip && state.trip.meta) {
      state.trip.meta.travelers = state.opt.people + "인 가족";
    }
    render();
  });
  var optBudgetGoal = document.getElementById("optBudgetGoal");
  if (optBudgetGoal) optBudgetGoal.addEventListener("change", function (e) { state.opt.budgetGoal = parseInt(e.target.value, 10) || 220; render(); });
  var optBudgetMax = document.getElementById("optBudgetMax");
  if (optBudgetMax) optBudgetMax.addEventListener("change", function (e) { state.opt.budgetMax = parseInt(e.target.value, 10) || 300; render(); });
  document.querySelectorAll(".opt-type").forEach(function (btn) {
    btn.addEventListener("click", function () { state.opt.type = btn.getAttribute("data-val"); render(); });
  });
  document.querySelectorAll(".opt-departure").forEach(function (btn) {
    btn.addEventListener("click", function () { state.opt.departure = btn.getAttribute("data-val"); render(); });
  });

  var destInput = document.getElementById("destInput");
  if (destInput) {
    destInput.addEventListener("input", function (e) { state.destInput = e.target.value; });
    destInput.addEventListener("keydown", function (e) { if (e.key === "Enter") handleGenerate(); });
  }
  var genBtn = document.getElementById("genBtn");
  if (genBtn) genBtn.addEventListener("click", handleGenerate);

  var keyToggle = document.getElementById("keyToggle");
  if (keyToggle) keyToggle.addEventListener("click", function () { state.showKeyBox = !state.showKeyBox; render(); });

  var apiKeyInput = document.getElementById("apiKeyInput");
  if (apiKeyInput) {
    apiKeyInput.addEventListener("blur", function (e) {
      state.apiKey = e.target.value.trim();
      localStorage.setItem("gemini_api_key", state.apiKey);
    });
    apiKeyInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        state.apiKey = e.target.value.trim();
        localStorage.setItem("gemini_api_key", state.apiKey);
        state.showKeyBox = false;
        state.error = "";
        render();
      }
    });
  }

  document.querySelectorAll(".meta-input").forEach(function (input) {
    input.addEventListener("change", function (e) {
      var field = e.target.getAttribute("data-meta");
      var val = e.target.value;
      if (field === "budgetGoal" || field === "budgetMax") {
        var won = (parseInt(val.replace(/[^0-9]/g, ""), 10) || 0) * 10000;
        state.trip.meta[field] = won;
        state.opt[field] = Math.round(won / 10000);
      } else {
        state.trip.meta[field] = val;
        if (field === "travelers") {
          var numMatch = val.match(/\d+/);
          if (numMatch) state.opt.people = parseInt(numMatch[0], 10);
        }
      }
      persistTrip(state.trip.meta.destination, state.trip);
      render();
    });
  });

  document.querySelectorAll(".load-trip").forEach(function (btn) {
    btn.addEventListener("click", function () { loadTrip(btn.getAttribute("data-dest")); });
  });

  document.querySelectorAll(".delete-trip").forEach(function (btn) {
    btn.addEventListener("click", function (e) {
      e.stopPropagation();
      var dest = btn.getAttribute("data-dest");
      if (confirm('"' + dest + '" 일정을 삭제할까요? 이 기기에서만 삭제되고 되돌릴 수 없어요.')) {
        deleteTrip(dest);
      }
    });
  });

  document.querySelectorAll(".folder-toggle").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var country = btn.getAttribute("data-country");
      state.openFolders[country] = !state.openFolders[country];
      render();
    });
  });

  var printBtn = document.getElementById("printBtn");
  if (printBtn) printBtn.addEventListener("click", printTripAsPDF);

  var pptxBtn = document.getElementById("pptxBtn");
  if (pptxBtn) pptxBtn.addEventListener("click", function () { exportTripToPPTX(state.trip); });

  var shareToggle = document.getElementById("shareToggle");
  if (shareToggle) shareToggle.addEventListener("click", function () { state.showShare = !state.showShare; render(); });

  var familyCodeInput = document.getElementById("familyCodeInput");
  if (familyCodeInput) familyCodeInput.addEventListener("input", function (e) { state.familyCode = e.target.value; });

  var createCodeBtn = document.getElementById("createCodeBtn");
  if (createCodeBtn) createCodeBtn.addEventListener("click", handleCreateFamilyCode);
  var connectCodeBtn = document.getElementById("connectCodeBtn");
  if (connectCodeBtn) connectCodeBtn.addEventListener("click", handleConnectFamilyCode);
  var uploadShareBtn = document.getElementById("uploadShareBtn");
  if (uploadShareBtn) uploadShareBtn.addEventListener("click", handleShareUpload);

  var copyLinkBtn = document.getElementById("copyLinkBtn");
  if (copyLinkBtn) copyLinkBtn.addEventListener("click", function () {
    var link = window.location.origin + window.location.pathname + "?code=" + encodeURIComponent(state.familyCode);
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(link).then(function () {
        state.shareStatus = "공유링크를 복사했어요. 카카오톡 등으로 가족에게 보내주세요: " + link;
        render();
      }).catch(function () {
        prompt("아래 링크를 직접 복사해서 보내주세요:", link);
      });
    } else {
      prompt("아래 링크를 직접 복사해서 보내주세요:", link);
    }
  });

  document.querySelectorAll(".load-shared").forEach(function (btn) {
    btn.addEventListener("click", function () { loadSharedTrip(btn.getAttribute("data-dest")); });
  });

  document.querySelectorAll(".souvenir-toggle").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var idx = btn.getAttribute("data-idx");
      var isOpen = !!state.souvenirOpen[idx];
      if (isOpen) {
        state.souvenirOpen[idx] = false;
        render();
        return;
      }
      state.souvenirOpen[idx] = true;
      var item = (state.trip.souvenirs || [])[idx];
      if (item && !state.souvenirImg[idx]) {
        state.souvenirImg[idx] = "loading";
        render();
        fetchSouvenirImage(item.img || item.name).then(function (url) {
          state.souvenirImg[idx] = { url: url };
          render();
        });
      } else {
        render();
      }
    });
  });

  document.querySelectorAll(".spots-subtab").forEach(function (btn) {
    btn.addEventListener("click", function () { state.spotsSubTab = btn.getAttribute("data-type"); render(); });
  });
  document.querySelectorAll(".food-subtab").forEach(function (btn) {
    btn.addEventListener("click", function () { state.foodSubTab = btn.getAttribute("data-meal"); render(); });
  });

  document.querySelectorAll(".tab-btn").forEach(function (btn) {
    btn.addEventListener("click", function () { state.activeTab = btn.getAttribute("data-tab"); render(); });
  });
}

// ---------------- 초기화 ----------------
loadInitial();

// 공유링크(?code=XXXX)로 들어온 경우 자동으로 코드 연결 + 공유 패널 펼치기
(function () {
  try {
    var urlCode = new URLSearchParams(window.location.search).get("code");
    if (urlCode) {
      state.familyCode = urlCode.trim();
      localStorage.setItem("family_code", state.familyCode);
      state.showShare = true;
      state.syncOn = true;
      state.shareStatus = '공유 링크로 "' + state.familyCode + '" 코드에 자동 연결했어요. 5초마다 동기화돼요.';
    }
  } catch (e) {}
})();

render();
if (state.syncOn) startPolling();

// ---- 서비스워커(오프라인 캐싱) Blob URL로 등록 (별도 파일 없이 단일파일 유지) ----
if ("serviceWorker" in navigator) {
  try {
    var swSource = [
      'self.addEventListener("install", function(e){ e.waitUntil(caches.open("tp-v1").then(function(c){ return c.add("/"); })); });',
      'self.addEventListener("fetch", function(e){',
      '  if (e.request.method !== "GET") return;', // POST 등은 절대 가로채지 않음 (Gemini/kvdb 호출 보호)
      '  if (new URL(e.request.url).origin !== self.location.origin) return;', // 같은 도메인만 캐싱 처리
      '  e.respondWith(caches.match(e.request).then(function(cached){',
      '    return cached || fetch(e.request).catch(function(){ return cached; });',
      '  }));',
      '});'
    ].join("\n");
    var blob = new Blob([swSource], { type: "text/javascript" });
    var swUrl = URL.createObjectURL(blob);
    window.addEventListener("load", function () {
      // 이전에 등록된(외부 API를 가로채던) 서비스워커가 남아있을 수 있어 모두 해제 후 새로 등록
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
        navigator.serviceWorker.register(swUrl).catch(function () {});
      }).catch(function () {
        navigator.serviceWorker.register(swUrl).catch(function () {});
      });
    });
  } catch (e) {}
}

})();
</script>
